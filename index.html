<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NineSixTwo — Legal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #F97316;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 15px;
            color: #6e6e73;
            margin-bottom: 40px;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 400px;
        }
        a.card {
            display: block;
            background: #fff;
            border-radius: 16px;
            padding: 22px 24px;
            text-decoration: none;
            color: #1d1d1f;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: box-shadow 0.2s;
        }
        a.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        a.card h2 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        a.card p {
            font-size: 13px;
            color: #6e6e73;
        }
        .arrow {
            float: right;
            color: #F97316;
            font-size: 18px;
            margin-top: -2px;
        }
        footer {
            margin-top: 40px;
            font-size: 13px;
            color: #6e6e73;
        }
    </style>
</head>
<body>

    <div class="logo">NineSixTwo</div>
    <div class="subtitle">Legal Documents</div>

    <div class="cards">
        <a href="privacy.html" class="card">
            <span class="arrow">→</span>
            <h2>Privacy Policy</h2>
            <p>How we collect, use, and protect your information.</p>
        </a>
        <a href="terms.html" class="card">
            <span class="arrow">→</span>
            <h2>Terms &amp; Conditions</h2>
            <p>The terms governing your use of NineSixTwo.</p>
        </a>
    </div>

    <footer>&copy; 2026 NineSixTwo. All rights reserved.</footer>

</body>
</html>
